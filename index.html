<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Who makes the show go on?</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="gradient-canvas"></div>

    <header class="page-header">
      <div class="page-title-card">
        <h1 class="page-title">WHO MAKES THE SHOW GO ON?</h1>
        <p class="page-subtitle">by Clara Brandão</p>
      </div>
    </header>

    <aside class="fact-banner" aria-live="polite">
      <div class="fact-card">
        <p class="fact-label">Did you know?</p>
        <p id="fact-text" class="fact-text"></p>
      </div>
    </aside>

    <main class="stage" aria-label="Performance workers data portrait">
      <div id="bubble-layer" class="bubble-layer" aria-hidden="true"></div>

      <section
        id="highlight-overlay"
        class="highlight-overlay"
        aria-live="polite"
        aria-hidden="true"
      >
        <div
          id="highlight-backdrop"
          class="highlight-backdrop"
          data-dismiss-target
        ></div>
      </section>

      <article
        id="highlight-card"
        class="highlight-card"
        role="dialog"
        aria-modal="true"
        aria-labelledby="highlight-name"
      >
        <button
          id="highlight-close"
          class="highlight-close"
          type="button"
          aria-label="Close details"
        >
          ×
        </button>

        <div class="highlight-media">
          <div class="highlight-photo-wrapper">
            <img
              id="highlight-photo"
              class="highlight-photo"
              src=""
              alt=""
              loading="lazy"
            />
            <div class="highlight-icon-ring">
              <img
                id="highlight-icon"
                class="highlight-icon"
                src=""
                alt=""
                loading="lazy"
              />
            </div>
          </div>
        </div>

        <div class="highlight-content">
          <h2 id="highlight-name" class="highlight-name"></h2>
          <p id="highlight-department" class="highlight-department"></p>
          <p id="highlight-bio" class="highlight-bio"></p>
          <p id="highlight-instagram" class="highlight-instagram"></p>
          <p id="highlight-worked-on" class="highlight-worked-on">Worked on</p>
          <p id="highlight-worked-musicals" class="highlight-worked-musicals">
            <span id="highlight-shows" class="highlight-shows"></span>
          </p>
        </div>
      </article>
    </main>

    <noscript>
      This interactive data portrait requires JavaScript to display the bubble
      cloud of workers.
    </noscript>

    <script src="script.js"></script>
  </body>
</html>
